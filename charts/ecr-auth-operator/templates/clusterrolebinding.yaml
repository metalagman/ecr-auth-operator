{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "ecr-auth-operator.fullname" . }}-manager-rolebinding
  labels:
    {{- include "ecr-auth-operator.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "ecr-auth-operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "ecr-auth-operator.fullname" . }}-manager-role
{{- end }}
