name: Release OCI Artifacts

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

jobs:
  validate:
    name: Validate release inputs
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Task
        uses: arduino/setup-task@v2

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Run release quality gates
        run: |
          task lint
          task test
          task helm-lint
          task helm-template

  release-image:
    name: Publish image
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Task
        uses: arduino/setup-task@v2

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR (Docker)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version from tag
        id: version
        run: |
          echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Publish OCI image
        env:
          VERSION: ${{ steps.version.outputs.value }}
          IMAGE_REPO: ghcr.io/metalagman/ecr-auth-operator
        run: |
          task release:image VERSION="${VERSION}" IMAGE_REPO="${IMAGE_REPO}"

  release-chart:
    name: Publish chart
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Task
        uses: arduino/setup-task@v2

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Login to GHCR (Helm OCI)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username "${{ github.actor }}" \
            --password-stdin

      - name: Resolve version from tag
        id: version
        run: |
          echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Publish OCI chart
        env:
          VERSION: ${{ steps.version.outputs.value }}
          CHART_OCI_REPO: oci://ghcr.io/metalagman/charts
        run: |
          task release:chart VERSION="${VERSION}" CHART_OCI_REPO="${CHART_OCI_REPO}"

  github-release:
    name: Create GitHub Release
    needs: [release-image, release-chart]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Draft GitHub release from tag
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
