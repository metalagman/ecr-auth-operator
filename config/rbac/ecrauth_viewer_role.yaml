# This rule is not used by the project ecr-auth-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to ecr.metalagman.dev resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: ecr-auth-operator
    app.kubernetes.io/managed-by: kustomize
  name: ecrauth-viewer-role
rules:
- apiGroups:
  - ecr.metalagman.dev
  resources:
  - ecrauths
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ecr.metalagman.dev
  resources:
  - ecrauths/status
  verbs:
  - get
