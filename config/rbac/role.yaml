---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - create
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - ecr.metalagman.dev
  resources:
  - ecrauths
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - ecr.metalagman.dev
  resources:
  - ecrauths/finalizers
  verbs:
  - update
- apiGroups:
  - ecr.metalagman.dev
  resources:
  - ecrauths/status
  verbs:
  - get
  - patch
  - update
