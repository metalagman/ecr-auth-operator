version: '3'

vars:
  LOCALBIN: '{{.ROOT_DIR}}/bin'
  CONTROLLER_GEN: '{{.LOCALBIN}}/controller-gen'
  ENVTEST: '{{.LOCALBIN}}/setup-envtest'
  GOLANGCI_LINT: '{{.LOCALBIN}}/golangci-lint'
  CONTROLLER_TOOLS_VERSION: v0.18.0
  GOLANGCI_LINT_VERSION: v2.1.0
  KIND_CLUSTER: ecr-auth-operator-test-e2e
  IMAGE_REPO: ghcr.io/metalagman/ecr-auth-operator
  CHART_OCI_REPO: oci://ghcr.io/metalagman/charts
  PLATFORMS: linux/amd64,linux/arm64

env:
  GOCACHE: '{{.ROOT_DIR}}/.cache/go-build'
  GOMODCACHE: /tmp/go/pkg/mod

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list-all

  tools:
    desc: Install local tool binaries used by tasks
    cmds:
      - |
        if [ ! -x "{{.CONTROLLER_GEN}}" ]; then
          GOBIN="{{.LOCALBIN}}" go install sigs.k8s.io/controller-tools/cmd/controller-gen@{{.CONTROLLER_TOOLS_VERSION}}
        fi
      - |
        if [ ! -x "{{.ENVTEST}}" ]; then
          GOBIN="{{.LOCALBIN}}" go install sigs.k8s.io/controller-runtime/tools/setup-envtest@release-0.21
        fi
      - |
        if [ ! -x "{{.GOLANGCI_LINT}}" ]; then
          GOBIN="{{.LOCALBIN}}" go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@{{.GOLANGCI_LINT_VERSION}}
        fi

  manifests:
    desc: Generate CRD and RBAC manifests
    deps: [tools]
    cmds:
      - '{{.CONTROLLER_GEN}} rbac:roleName=manager-role crd webhook paths="./..." output:crd:artifacts:config=config/crd/bases'

  generate:
    desc: Generate DeepCopy methods
    deps: [tools]
    cmds:
      - '{{.CONTROLLER_GEN}} object:headerFile="hack/boilerplate.go.txt" paths="./..."'

  fmt:
    desc: Format Go code
    cmds:
      - gofmt -w ./api ./cmd ./internal ./test

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  lint:
    desc: Run golangci-lint
    deps: [tools]
    cmds:
      - '{{.GOLANGCI_LINT}} run'

  test:
    desc: Run unit and envtest-based controller tests (excluding e2e)
    deps: [manifests, generate, tools]
    env:
      ENVTEST_K8S_VERSION:
        sh: go list -m -f "{{"{{"}} .Version {{"}}"}}" k8s.io/api | awk -F'[v.]' '{printf "1.%d", $3}'
    cmds:
      - |
        KUBEBUILDER_ASSETS="$({{.ENVTEST}} use ${ENVTEST_K8S_VERSION} --bin-dir {{.LOCALBIN}} -p path)" \
        go test $(go list ./... | grep -v /e2e) -coverprofile cover.out

  test-e2e:
    desc: Run end-to-end tests with kind
    deps: [manifests, generate, vet]
    cmds:
      - |
        if kind get clusters | grep -qx "{{.KIND_CLUSTER}}"; then
          kind delete cluster --name "{{.KIND_CLUSTER}}"
        fi
        kind create cluster --name "{{.KIND_CLUSTER}}"
        trap 'kind delete cluster --name "{{.KIND_CLUSTER}}"' EXIT
        KIND_CLUSTER="{{.KIND_CLUSTER}}" go test ./test/e2e/ -v -ginkgo.v

  build:
    desc: Build manager binary
    deps: [manifests, generate, vet]
    cmds:
      - go build -o bin/manager cmd/main.go

  helm-lint:
    desc: Lint Helm chart
    cmds:
      - helm lint charts/ecr-auth-operator

  helm-template:
    desc: Render Helm chart templates
    cmds:
      - helm template ecr-auth-operator charts/ecr-auth-operator > /dev/null

  terraform:fmt:
    desc: Format Terraform code
    cmds:
      - terraform fmt -recursive terraform

  terraform:validate:
    desc: Validate Terraform module and example
    cmds:
      - |
        for dir in terraform/modules/ecr-auth-operator terraform/examples/ecr-auth-operator; do
          terraform -chdir="${dir}" init -backend=false
          terraform -chdir="${dir}" validate
        done

  release:image:
    desc: Build and publish the controller OCI image
    cmds:
      - |
        : "${VERSION:?VERSION is required}"
        docker buildx inspect ecr-auth-operator-builder >/dev/null 2>&1 || docker buildx create --name ecr-auth-operator-builder --driver docker-container
        docker buildx use ecr-auth-operator-builder
        docker buildx build \
          --platform "{{.PLATFORMS}}" \
          --push \
          -t "{{.IMAGE_REPO}}:${VERSION}" \
          -t "{{.IMAGE_REPO}}:latest" \
          .

  release:chart:
    desc: Package and publish the Helm chart to OCI
    cmds:
      - |
        : "${VERSION:?VERSION is required}"
        tmp_dir="$(mktemp -d)"
        trap 'rm -rf "${tmp_dir}"' EXIT
        helm package charts/ecr-auth-operator \
          --version "${VERSION}" \
          --app-version "${VERSION}" \
          --destination "${tmp_dir}"
        helm push "${tmp_dir}/ecr-auth-operator-${VERSION}.tgz" "{{.CHART_OCI_REPO}}"

  release:all:
    desc: Run validation and publish image/chart artifacts
    deps: [lint, test, helm-lint, helm-template]
    cmds:
      - task: release:image
      - task: release:chart
